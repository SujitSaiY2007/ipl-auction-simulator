<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock IPL Auction</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        /* Lobby Styles */
        .lobby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .lobby-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e2e6ea; }
        .checkbox-list { max-height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 15px; background: white; border-radius: 5px; margin-bottom: 15px; }
        .checkbox-list label { display: block; margin-bottom: 8px; cursor: pointer; }
        .save-file { background: white; border: 1px solid #ccc; padding: 12px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-launch { width: 100%; background: #28a745; color: white; border: none; padding: 12px; font-size: 1.1em; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-load { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* Auction Room Styles */
        .player-card { background: #003a6c; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-top: 15px; }
        .bidding-area { background: #e9ecef; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
        .bidding-area h2 { color: #28a745; font-size: 2.5em; margin: 10px 0; }
        .buttons button { padding: 12px 20px; margin: 5px; font-size: 1.1em; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-sold { background-color: #28a745; }
        .btn-unsold { background-color: #dc3545; }
        .franchise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .team-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .team-card:hover { transform: scale(1.02); background: #e2e6ea; }
        .team-card h3 { margin: 0 0 10px 0; color: #333; }
        .team-card .purse { font-size: 1.4em; color: #dc3545; font-weight: bold; }
        .btn-quit { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: left; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    
    <div id="lobby-screen">
        <h1>🏏 IPL Simulator Lobby</h1>
        <div class="lobby-grid">
            
            <div class="lobby-panel">
                <h3>Start New Game</h3>
                <input type="text" id="newAuctionName" placeholder="Enter Session Name (e.g., Friday Night Draft)" style="width: 95%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
                
                <p><strong>Select Participating Franchises:</strong></p>
                <div id="franchiseCheckboxes" class="checkbox-list">
                    </div>
                
                <button class="btn-launch" onclick="createNewGame()">🚀 Launch New Auction</button>
            </div>

            <div class="lobby-panel">
                <h3>Resume Past Game</h3>
                <div id="pastGamesList" style="max-height: 350px; overflow-y: auto;">
                    </div>
            </div>

        </div>
    </div>

    <div id="auction-screen" style="display: none;">
        <button class="btn-quit" onclick="location.reload()">🏠 Quit to Lobby</button>
        <div style="clear: both;"></div>
        
        <h1 id="activeAuctionTitle">🏏 Auction Room</h1>
        
        <div class="player-card">
            <h1 id="playerName">Click "Next Player" to Start</h1>
            <p id="playerRole" style="color: #ccc; font-size: 1.2em;">- | -</p>
            <div class="stats-grid">
                <div><strong>Base Price:</strong><br><span id="basePrice">₹0</span></div>
                <div><strong>Highlight:</strong><br><span id="highlight">-</span></div>
            </div>
        </div>

        <div class="bidding-area">
            <h2 id="currentBidDisplay">Current Bid: ₹0</h2>
            <div>
                <button style="background: #ffc107; color: black;" onclick="increaseBid(2000000)">+ ₹20 Lakh</button>
                <button style="background: #ffc107; color: black;" onclick="increaseBid(5000000)">+ ₹50 Lakh</button>
                <button style="background: #ffc107; color: black;" onclick="increaseBid(10000000)">+ ₹1 Crore</button>
            </div>
            
            <div style="margin: 20px 0;">
                <label style="font-weight: bold; font-size: 1.2em;">Selling to: </label>
                <select id="teamSelect" style="font-size: 1.2em; padding: 5px;"></select>
            </div>

            <div class="buttons">
                <button class="btn-sold" onclick="sellPlayer()">🔨 SOLD</button>
                <button class="btn-unsold" onclick="unsoldPlayer()">❌ UNSOLD</button>
                <button style="background: #007bff;" onclick="fetchNextPlayer()">⏭️ Next Player</button>
                <button id="undoBtn" style="background: #6c757d; display: none;" onclick="undoLast()">↩️ Undo Last</button>
            </div>
        </div>

        <h2 style="text-align: center; margin-top: 40px;">Franchise Status</h2>
        <div class="franchise-grid" id="teamsGrid"></div>
    </div>

</div>

<script>
    // --- STATE VARIABLES ---
    let currentPlayer = null;
    let currentBid = 0;
    let lastTransaction = null;

    // --- INITIALIZATION ---
    window.onload = loadLobby;

    // Formatter Utility
    function formatCurrency(amount) {
        return amount.toLocaleString('en-IN');
    }

    // ==========================================
    // LOBBY LOGIC
    // ==========================================
    async function loadLobby() {
        const response = await fetch('http://127.0.0.1:5000/api/lobby/data');
        const data = await response.json();
        
        // 1. Render Franchises (Checkboxes)
        const checkList = document.getElementById('franchiseCheckboxes');
        checkList.innerHTML = '';
        data.franchises.forEach(f => {
            checkList.innerHTML += `
                <label>
                    <input type="checkbox" class="franchise-cb" value="${f.id}" checked>
                    ${f.name}
                </label>
            `;
        });

        // 2. Render Past Save Files
        const gamesList = document.getElementById('pastGamesList');
        gamesList.innerHTML = '';
        if (data.auctions.length === 0) {
            gamesList.innerHTML = '<p style="color: gray;">No saved games found.</p>';
        } else {
            data.auctions.forEach(a => {
                const date = new Date(a.date_created).toLocaleDateString();
                const statusBadge = a.status === 'In Progress' ? '🟢 Active' : '⚪ Paused';
                gamesList.innerHTML += `
                    <div class="save-file">
                        <div>
                            <strong>${a.name}</strong><br>
                            <small style="color: gray;">${date} | ${statusBadge}</small>
                        </div>
                        <button class="btn-load" onclick="resumeGame(${a.id}, '${a.name}')">Resume</button>
                    </div>
                `;
            });
        }
    }

    async function createNewGame() {
        const nameInput = document.getElementById('newAuctionName').value || 'Custom Session';
        
        // Gather selected checkboxes
        const checkboxes = document.querySelectorAll('.franchise-cb:checked');
        const selectedIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

        if (selectedIds.length === 0) return alert("Please select at least one franchise!");

        const response = await fetch('http://127.0.0.1:5000/api/lobby/new', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameInput, franchise_ids: selectedIds })
        });

        if (response.ok) {
            document.getElementById('activeAuctionTitle').innerText = `🏏 ${nameInput}`;
            transitionToAuction();
        } else {
            alert("Failed to create game.");
        }
    }

    async function resumeGame(auctionId, auctionName) {
        const response = await fetch('http://127.0.0.1:5000/api/lobby/load', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ auction_id: auctionId })
        });

        if (response.ok) {
            document.getElementById('activeAuctionTitle').innerText = `🏏 ${auctionName}`;
            transitionToAuction();
        }
    }

    function transitionToAuction() {
        // Hide Lobby, Show Auction Room
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('auction-screen').style.display = 'block';
        
        // Load the specific game state
        loadTeams();
        
        // Reset player screen
        currentPlayer = null;
        document.getElementById('playerName').innerText = 'Click "Next Player" to Start';
        document.getElementById('playerRole').innerText = '- | -';
        document.getElementById('basePrice').innerText = '₹0';
        document.getElementById('highlight').innerText = '-';
        currentBid = 0;
        document.getElementById('currentBidDisplay').innerText = `Current Bid: ₹0`;
        document.getElementById('undoBtn').style.display = 'none';
    }


    // ==========================================
    // AUCTION GAMEPLAY LOGIC
    // ==========================================
    async function loadTeams() {
        try {
            const response = await fetch('http://127.0.0.1:5000/api/teams');
            if (!response.ok) throw new Error("Failed to load teams");
            
            const teams = await response.json();
            const grid = document.getElementById('teamsGrid');
            const select = document.getElementById('teamSelect');
            grid.innerHTML = '';
            select.innerHTML = '';

            teams.forEach(team => {
                select.innerHTML += `<option value="${team.id}">${team.name}</option>`;
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <h3>${team.name}</h3>
                    <div class="purse">₹${formatCurrency(team.purse)}</div>
                    <p>Squad: ${team.squad_size}/25</p>
                    <p style="font-size: 0.8em; color: gray;">Click to view roster</p>
                `;
                card.onclick = () => viewTeamRoster(team.id, team.name);
                grid.appendChild(card);
            });
        } catch (error) {
            console.error(error);
        }
    }

    async function fetchNextPlayer() {
        const response = await fetch('http://127.0.0.1:5000/api/next-player');
        if (response.status === 404) return alert("No more available players in this session!");
        
        currentPlayer = await response.json();
        
        document.getElementById('playerName').innerText = currentPlayer.display_name;
        document.getElementById('playerRole').innerText = `${currentPlayer.role} | ${currentPlayer.country}`;
        document.getElementById('basePrice').innerText = `₹${formatCurrency(currentPlayer.base_price)}`;
        document.getElementById('highlight').innerText = currentPlayer.career_highlight;
        
        currentBid = currentPlayer.base_price;
        document.getElementById('currentBidDisplay').innerText = `Current Bid: ₹${formatCurrency(currentBid)}`;
        
        // Removed the line that was hiding the Undo button here!
    }

    function increaseBid(amount) {
        if (!currentPlayer) return alert("Please draw a player first!");
        currentBid += amount;
        document.getElementById('currentBidDisplay').innerText = `Current Bid: ₹${formatCurrency(currentBid)}`;
    }

    async function sellPlayer() {
        if (!currentPlayer) return alert("Please draw a player first!");
        const teamId = document.getElementById('teamSelect').value;

        const response = await fetch('http://127.0.0.1:5000/api/resolve-player', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player_id: currentPlayer.id, status: 'Sold', team_id: parseInt(teamId), final_price: currentBid })
        });

        if (response.ok) {
            alert(`${currentPlayer.display_name} SOLD for ₹${formatCurrency(currentBid)}!`);
            lastTransaction = { player_id: currentPlayer.id, was_sold: true, team_id: parseInt(teamId), final_price: currentBid };
            document.getElementById('undoBtn').style.display = 'inline-block';
            currentPlayer = null; 
            loadTeams(); 
            fetchNextPlayer(); 
        } else {
            const res = await response.json();
            alert(`Error: ${res.error}`);
        }
    }

    async function unsoldPlayer() {
        if (!currentPlayer) return alert("Please draw a player first!");
        const response = await fetch('http://127.0.0.1:5000/api/resolve-player', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player_id: currentPlayer.id, status: 'Unsold' })
        });

        if (response.ok) {
            alert(`${currentPlayer.display_name} goes UNSOLD.`);
            lastTransaction = { player_id: currentPlayer.id, was_sold: false };
            document.getElementById('undoBtn').style.display = 'inline-block';
            currentPlayer = null;
            fetchNextPlayer();
        }
    }

    async function undoLast() {
        if (!lastTransaction) return alert("No transaction history found!");
        if (!confirm("Are you sure you want to undo the last action?")) return;

        const response = await fetch('http://127.0.0.1:5000/api/undo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(lastTransaction)
        });

        if (response.ok) {
            alert("Undo successful! Player returned to the pool.");
            lastTransaction = null; 
            document.getElementById('undoBtn').style.display = 'none'; 
            loadTeams(); 
        }
    }

    async function viewTeamRoster(teamId, teamName) {
        const response = await fetch(`http://127.0.0.1:5000/api/roster/${teamId}`);
        const roster = await response.json();
        if (roster.length === 0) return alert(`${teamName} hasn't bought any players yet!`);
        
        let rosterList = `${teamName} Roster:\n\n`;
        roster.forEach(p => rosterList += `- ${p.display_name} (${p.role}) : ₹${formatCurrency(p.sold_price)}\n`);
        alert(rosterList);
    }
</script>
</body>
</html>
